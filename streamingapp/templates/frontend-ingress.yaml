apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress-service
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service-service
                port:
                  number: 80

