image:
  tag: "eb2eb4d"

services:
  - name: auth-service
    imagename: streamingapp-auth
    replicaCount: 1
    port: 3001
    path: /api/(auth/?.*)
    servicetype: ClusterIP
    env:
      - name: PORT
        valueFrom:
          configMapKeyRef:
            name: configmap
            key: AUTH_SERVICE_PORT
      - name: MONGO_URI
        valueFrom:
          configMapKeyRef:
            name: configmap
            key: MONGO_URI
      - name: JWT_SECRET
        valueFrom:
          secretKeyRef:
            name: secrets
            key: JWT_SECRET
      - name: CLIENT_URL
        valueFrom:
          configMapKeyRef:
            name: configmap
            key: CLIENT_URL
      - name: AWS_SECRET_KEY_ID
        valueFrom:
          secretKeyRef:
            name: secrets
            key: AWS_SECRET_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: secrets
            key: AWS_SECRET_ACCESS_KEY
      - name: AWS_REGION
        valueFrom:
          configMapKeyRef:
            name: configmap
            key: AWS_REGION
      - name: AWS_S3_BUCKET
        valueFrom:
          configMapKeyRef:
            name: configmap
            key: AWS_S3_BUCKET
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  
