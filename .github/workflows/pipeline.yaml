  name: Flask App CI/CD Pipeline
  on:
    push:
      branches: ["main"]
      paths-ignore:
        - "streamingapp/values.yaml"

  permissions:
    contents: write
  
  jobs:
    buildandpush:
      runs-on: ubuntu-latest
      environment: all
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Use Node.js
          uses: actions/setup-node@v4

        # - name: Install NPM
        #   run: npm install

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v1
          with:
            aws-access-key-id: ${{ secrets.AWS_SECRET_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
            aws-region: ap-south-2
        
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Set short commit SHA to image tag
          id: vars
          run: echo "IMAGE_TAG=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

        - name: Build, tag, and push the image to Amazon ECR
          id: build-image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            TAG: ${{ env.IMAGE_TAG }}
          run: |
            docker compose build
            docker compose push
        
        - name: Update image.tag in k8s/values.yaml using sed
          run: |
            set -e
            FILE="streamingapp/values.yaml"

            # Update tag only inside the 'image:' block
            sed -i -E '/^image:/,/^[a-zA-Z0-9_-]+:/{s/^([[:space:]]*tag:[[:space:]]*).*/\1"'${IMAGE_TAG}'"/}' "$FILE"

            echo "Updated tag:"
            grep -n -A2 -B2 '^image:' "$FILE"
        
        - name: Commit and push values.yaml change
          run: |
            set -e
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add streamingapp/values.yaml
            git commit -m "chore: bump image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
            git push



